name: alterx_flutter
description: Premium Alterations App - Order pickup and alteration services
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.6
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  google_generative_ai: ^0.2.2
  
  # State Management
  provider: ^6.1.1
  shared_preferences: ^2.2.0
  
  # Utilities
  url_launcher: ^6.1.14
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  connectivity_plus: ^5.0.2
  
  # Animations
  animations: ^2.0.9
  lottie: ^2.7.0
  
  # Forms & Validation
  form_validator: ^2.0.0
  masked_text: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - .env
  
  # Fonts - Playfair Display & Lato
  # Alternative simplified fonts section
fonts:
  - family: Playfair
    fonts:
      - asset: assets/fonts/PlayfairDisplay-Regular.ttf
      - asset: assets/fonts/PlayfairDisplay-Bold.ttf
        weight: 700
      - asset: assets/fonts/PlayfairDisplay-Italic.ttf
        style: italic
  
  - family: Lato
    fonts:
      - asset: assets/fonts/Lato-Regular.ttf
      - asset: assets/fonts/Lato-Bold.ttf
        weight: 700
      - asset: assets/fonts/Lato-Light.ttf
        weight: 300
  
  # Custom icons (if needed)
  # To use custom icons, uncomment and configure:
  # generate: true
  # 
  # fonts:
  #   - family: AlterX
  #     fonts:
  #       - asset: assets/fonts/alterx_icons.ttf

# Platform specific configurations
flutter_intl:
  enabled: true

# For iOS specific settings
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0C0A09"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"